{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Login{% endblock %} | Gestok</title>
  <!-- Google Fonts Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Bootstrap 5.3 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Gestok CSS -->
  <link href="{% static 'css/gestok.css' %}?v=20260608-dark-theme-14" rel="stylesheet">
  {% block extra_css %}{% endblock %}
</head>
<body class="auth-body">
  <div class="auth-container d-flex align-items-center justify-content-center vh-100">
    <div class="auth-card">
      <div class="text-center mb-4">
        <div class="auth-logo">
          <i class="bi bi-box-seam-fill"></i>
        </div>
        <h1 class="auth-brand">Gestok</h1>
        <p class="auth-subtitle">Sistema de Vendas</p>
      </div>
      {% if messages %}
      <div class="mb-3">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show py-2 px-3" role="alert" style="font-size: 0.875rem;">
          <i class="bi {% if message.tags == 'success' %}bi-check-circle-fill{% elif message.tags == 'error' %}bi-x-circle-fill{% elif message.tags == 'warning' %}bi-exclamation-triangle-fill{% else %}bi-info-circle-fill{% endif %} me-2"></i>
          {{ message }}
          <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert" aria-label="Fechar"></button>
        </div>
        {% endfor %}
      </div>
      {% endif %}
      {% block auth_content %}{% endblock %}
    </div>
  </div>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Gestok JS -->
  <script src="{% static 'js/gestok.js' %}?v=20260608-date-filters-1"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
